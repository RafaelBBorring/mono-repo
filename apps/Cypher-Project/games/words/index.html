<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHYPER — Hacker Typing Game</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  >

  <!-- Game stylesheet -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ══ BACKGROUND LAYERS ══════════════════════════ -->
<canvas id="matrix-canvas"></canvas>
<div id="bg-grid"></div>
<div id="bg-vignette"></div>
<div id="scan-line"></div>
<div id="crt-lines"></div>

<!-- ══ SCREEN EFFECTS ════════════════════════════ -->
<div id="dmg-flash"></div>
<div id="heal-flash"></div>

<!-- ══ APP ════════════════════════════════════════ -->
<div id="app">

  <!-- HUD -->
  <div id="hud">
    <div class="hud-logo">CHY<span class="accent">P</span>ER</div>

    <div class="hud-center">
      <div class="hud-stat">
        <span class="val" id="hud-score">0</span>
        <span class="lbl">PONTOS</span>
      </div>
      <div class="hud-divider"></div>
      <div class="hud-stat">
        <span class="val" id="hud-phase">01</span>
        <span class="lbl">FASE</span>
      </div>
      <div class="hud-divider"></div>
      <div class="hud-stat">
        <span class="val" id="hud-wpm">0</span>
        <span class="lbl">PAL/MIN</span>
      </div>
    </div>

    <div class="d-flex align-items-center gap-3">
      <span id="diff-badge" class="diff-badge normal">NORMAL</span>
      <div id="hud-lives"></div>
    </div>
  </div>

  <!-- COMBO RIBBON -->
  <div id="combo-ribbon">COMBO ×1</div>

  <!-- GAME CANVAS -->
  <div id="game-canvas">
    <div id="firewall-line"></div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom">
    <div id="prog-wrap">
      <div class="prog-meta">
        <span id="prog-phase">FASE 01 — FIREWALL EXTERNO</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div id="input-row">
      <span id="prompt-symbol">&gt;_</span>
      <input
        id="hack-input"
        type="text"
        placeholder="DIGITE A PALAVRA..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <div class="mini-stats">
        <div class="mini-stat-row">
          <span class="ms-lbl">ACC</span>
          <div class="ms-bar"><div class="ms-fill" id="acc-fill" style="width:100%"></div></div>
        </div>
        <div class="mini-stat-row">
          <span class="ms-lbl">MATCH</span>
          <div class="ms-bar"><div class="ms-fill" id="match-fill" style="width:0%;background:var(--c-cyan)"></div></div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- ══ OVERLAY ════════════════════════════════════ -->
<div id="overlay" style="display:none">
  <div class="ov-corner tl"></div>
  <div class="ov-corner tr"></div>
  <div class="ov-corner bl"></div>
  <div class="ov-corner br"></div>

  <div class="ov-title" id="ov-title">CHY<span class="accent">P</span>ER</div>
  <div class="ov-tagline" id="ov-tagline">SISTEMA DE INVASÃO v1.1.0</div>

  <!-- Difficulty selector (shown only on main menu) -->
  <div id="diff-selector">
    <button type="button" class="diff-btn easy"   data-diff="easy">EASY</button>
    <button type="button" class="diff-btn normal" data-diff="normal">NORMAL</button>
    <button type="button" class="diff-btn hard"   data-diff="hard">HARD</button>
    <button type="button" class="diff-btn insane" data-diff="insane">INSANE</button>
  </div>
  <div class="diff-desc" id="diff-desc"></div>

  <!-- Phase info panel -->
  <div id="phase-panel">
    <span class="pp-label">OBJETIVO</span>
    <div class="pp-phase-name" id="pp-phase-name">FASE 01 — FIREWALL EXTERNO</div>
    <div class="pp-desc" id="pp-desc">Derrube o firewall externo.<br>Palavras simples. Aqueça os dedos.</div>
  </div>

  <!-- Result grid (shown on game over / phase clear) -->
  <div class="result-grid" id="result-grid" style="display:none"></div>

  <!-- CTA buttons -->
  <div class="ov-btns">
    <button type="button" class="ov-btn" id="ov-btn-primary" data-action="start">INICIAR INVASÃO</button>
    <button type="button" class="ov-btn secondary" id="ov-btn-secondary" style="display:none">MENU</button>
  </div>
</div>

<!-- ══ SCRIPTS (order matters) ══════════════════ -->
<script src="js/config.js"></script>
<script src="js/matrix.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>

</body>
</html>
